services:
  - type: web
    name: agno-security-review
    env: python
    envVars:
      - key: PYTHON_VERSION
        scope: build
        value: "3.11.0"
      - key: GITHUB_TOKEN
        scope: run
        value: your_github_token_here
      - key: OPENAI_API_KEY
        scope: run
        value: your_openai_api_key_here
      - key: WEBHOOK_SECRET
        scope: run
        value: test-secret-123
      - key: DATABASE_URL
        scope: run
        value: sqlite:///./security_audit.db
      - key: ENVIRONMENT
        scope: run
        value: production
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python src/main.py
